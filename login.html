<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng nhập - MySPay Wallet</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --primary-light: #e6f2ff;
            --bg-color: #f8faff;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e1e8ed;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background-color: var(--primary-color); 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            padding: 30px 20px 20px;
        }

        .auth-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-light);
            padding: 5px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .auth-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* Forms */
        .auth-form {
            padding: 30px 25px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            top: 15px;
            left: 15px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-color);
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--text-main); color: white; text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed; z-index: 10000; left: 50%; bottom: 30px; transform: translateX(-50%); box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #toast.success { background-color: var(--success); }
        #toast.error { background-color: var(--danger); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <img src="logo.png" alt="MySPay Logo" onerror="this.src='https://via.placeholder.com/60/007bff/ffffff?text=M'">
            <h2>MySPay Wallet</h2>
            <p>Nền tảng quản lý tài sản số của bạn</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="login-email" placeholder="Email của bạn" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="login-password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-primary" id="btn-login">Đăng Nhập</button>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" class="form-control" id="reg-name" placeholder="Họ và Tên" required>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="reg-email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="reg-password" placeholder="Mật khẩu" required minlength="6">
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="reg-confirm-password" placeholder="Xác nhận mật khẩu" required minlength="6">
            </div>
            <div class="form-group">
                <i class="fas fa-link"></i>
                <input type="text" class="form-control" id="reg-referral" placeholder="Mã giới thiệu (Nếu có)">
            </div>
            <button type="submit" class="btn-primary" id="btn-register">Tạo Tài Khoản Mới</button>
        </form>
    </div>

    <div id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toast-message">Thông báo</span>
    </div>

    <script>
        // Cấu hình API Server Node.js của bạn
        const API_BASE_URL = 'http://localhost:3000/api/auth';

        // Xử lý tự động điền mã giới thiệu nếu có trên thanh URL (VD: myspaywallet.com/login.html?ref=ABCD123)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if(refCode) {
                switchTab('register');
                document.getElementById('reg-referral').value = refCode;
            }
        };

        function showToast(message, type = 'info') {
            const toast = document.getElementById("toast");
            const icon = toast.querySelector('i');
            toast.className = ""; icon.className = "";
            document.getElementById("toast-message").innerText = message;
            toast.classList.add(type);
            if(type === 'success') icon.className = "fas fa-check-circle";
            else if(type === 'error') icon.className = "fas fa-exclamation-circle";
            else icon.className = "fas fa-info-circle";
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        // --- GỬI YÊU CẦU ĐĂNG NHẬP ---
        async function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang kết nối...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Lưu Token và địa chỉ ví định danh do Server trả về
                    localStorage.setItem('myspay_token', data.token);
                    localStorage.setItem('myspay_address', data.wallet_address);
                    
                    showToast('Đăng nhập thành công!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showToast(data.message || 'Email hoặc mật khẩu không chính xác', 'error');
                }
            } catch (error) {
                // Xử lý khi server.js chưa bật
                showToast('Không thể kết nối đến máy chủ. Vui lòng kiểm tra Server Node.js', 'error');
            } finally {
                btn.innerHTML = 'Đăng Nhập';
                btn.disabled = false;
            }
        }

        // --- GỬI YÊU CẦU ĐĂNG KÝ ---
        async function handleRegister(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-register');
            const fullName = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const referralCode = document.getElementById('reg-referral').value;

            if (password !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang khởi tạo ví...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        full_name: fullName, 
                        email: email, 
                        password: password,
                        referred_by: referralCode 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Đăng ký thành công! Vui lòng đăng nhập.', 'success');
                    document.getElementById('registerForm').reset();
                    switchTab('login');
                    document.getElementById('login-email').value = email; // Tự điền sẵn email
                } else {
                    showToast(data.message || 'Lỗi đăng ký (Email đã tồn tại)', 'error');
                }
            } catch (error) {
                showToast('Không thể kết nối đến máy chủ. Vui lòng kiểm tra Server Node.js', 'error');
            } finally {
                btn.innerHTML = 'Tạo Tài Khoản Mới';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

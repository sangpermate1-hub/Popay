<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng nhập - MetahashPay</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0066ff;
            --primary-light: #e6f0ff;
            --bg-color: #f5f8fa;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background: linear-gradient(135deg, var(--primary-color), #004ecc);
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            padding: 35px 20px 20px;
        }

        .auth-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--primary-light);
            padding: 5px;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .auth-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .auth-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            text-align: center;
            border: none;
            background: none;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: white;
        }

        /* Forms */
        .auth-form {
            padding: 35px 25px;
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            top: 15px;
            left: 15px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-color);
            transition: 0.2s;
            font-weight: 500;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Toast - Hiển thị ở trên cùng cho dễ nhìn */
        #toast { visibility: hidden; min-width: 250px; background-color: var(--text-main); color: white; text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed; z-index: 10000; left: 50%; top: 20px; transform: translateX(-50%); box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; gap: 12px; opacity: 0; transition: 0.3s; font-weight: 600; }
        #toast.show { visibility: visible; opacity: 1; top: 40px; }
        #toast.success { background-color: var(--success); }
        #toast.error { background-color: var(--danger); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <img src="logo.png" alt="MetahashPay Logo" onerror="this.src='https://via.placeholder.com/70/0066ff/ffffff?text=M'">
            <h2>MetahashPay</h2>
            <p>Nền tảng thanh toán phi tập trung</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" onclick="switchTab('register')">Mở tài khoản</button>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="login-email" placeholder="Email của bạn" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="login-password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit" class="btn-primary" id="btn-login">Đăng Nhập</button>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" class="form-control" id="reg-name" placeholder="Họ và Tên" required>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="reg-email" placeholder="Email đăng ký" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="reg-password" placeholder="Mật khẩu (Tối thiểu 6 ký tự)" required minlength="6">
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="reg-confirm-password" placeholder="Xác nhận mật khẩu" required minlength="6">
            </div>
            <div class="form-group">
                <i class="fas fa-gift"></i>
                <input type="text" class="form-control" id="reg-referral" placeholder="Mã giới thiệu (Tùy chọn)">
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-bottom: 15px;">
                Hệ thống sẽ tự động tạo địa chỉ ví MPT Smart Chain cho bạn.
            </p>
            <button type="submit" class="btn-primary" id="btn-register">Đăng Ký Ví Mới</button>
        </form>
    </div>

    <div id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toast-message">Thông báo</span>
    </div>

    <script>
        // Tự động kiểm tra nếu đã đăng nhập thì nhảy thẳng vào ví
        if(localStorage.getItem('metahashpay_token') && localStorage.getItem('metahashpay_address')) {
            window.location.href = 'index.html';
        }

        // ============================================================
        // NHẬN DIỆN DOMAIN TỰ ĐỘNG ĐỂ GỌI API
        // ============================================================
        let API_BASE_URL = '';
        const currentHost = window.location.hostname;

        if (currentHost === 'localhost' || currentHost === '127.0.0.1') {
            API_BASE_URL = 'http://localhost:3000/api/auth';
        } else {
            API_BASE_URL = `https://${currentHost}/api/auth`; 
            // LƯU Ý: Nếu frontend ở metahash.online nhưng backend chạy ở Railway,
            // Bạn cần sửa dòng trên thành: API_BASE_URL = 'https://app-name.up.railway.app/api/auth';
        }

        // Bắt mã giới thiệu từ URL nếu có (VD: metahash.online/login.html?ref=123456)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if(refCode) {
                switchTab('register');
                document.getElementById('reg-referral').value = refCode;
            }
        };

        function showToast(message, type = 'info') {
            const toast = document.getElementById("toast");
            const icon = toast.querySelector('i');
            toast.className = ""; icon.className = "";
            document.getElementById("toast-message").innerText = message;
            toast.classList.add(type);
            if(type === 'success') icon.className = "fas fa-check-circle";
            else if(type === 'error') icon.className = "fas fa-exclamation-circle";
            else icon.className = "fas fa-info-circle";
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        // --- GỬI YÊU CẦU ĐĂNG NHẬP ---
        async function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang kết nối mạng lưới...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Cấp phát token và địa chỉ ví định dạng M...
                    localStorage.setItem('metahashpay_token', data.token);
                    localStorage.setItem('metahashpay_address', data.wallet_address);
                    
                    showToast('Đăng nhập thành công!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showToast(data.message || 'Email hoặc mật khẩu không chính xác', 'error');
                }
            } catch (error) {
                showToast('Không thể kết nối Database. Vui lòng kiểm tra Server.', 'error');
            } finally {
                btn.innerHTML = 'Đăng Nhập';
                btn.disabled = false;
            }
        }

        // --- GỬI YÊU CẦU ĐĂNG KÝ ---
        async function handleRegister(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-register');
            const fullName = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const referralCode = document.getElementById('reg-referral').value;

            if (password !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang khởi tạo Ví MPT...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        full_name: fullName, 
                        email: email, 
                        password: password,
                        referred_by: referralCode 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast(`Tạo ví thành công! Địa chỉ của bạn: ${data.wallet_address.substring(0, 8)}...`, 'success');
                    document.getElementById('registerForm').reset();
                    
                    // Tự động chuyển qua tab Đăng nhập và điền sẵn email
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-email').value = email;
                    }, 2000);
                } else {
                    showToast(data.message || 'Lỗi đăng ký (Email đã tồn tại)', 'error');
                }
            } catch (error) {
                showToast('Không thể kết nối Database. Vui lòng kiểm tra Server.', 'error');
            } finally {
                btn.innerHTML = 'Đăng Ký Ví Mới';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

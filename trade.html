<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giao dịch P2P - MetahashPay</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0066ff;
            --primary-light: #e6f0ff;
            --bg-color: #f5f8fa;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --vnd-color: #ea580c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 75px; }

        /* Header */
        .header { background: var(--primary-color); padding: 20px; color: white; padding-bottom: 60px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header-title { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: bold; }
        .post-ad-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: 600; backdrop-filter: blur(5px); }

        /* Tabs */
        .p2p-tabs { display: flex; background: var(--card-bg); margin: -30px 20px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 15px 5px; text-align: center; border: none; background: none; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active.buy-tab { color: var(--success); border-bottom-color: var(--success); }
        .tab-btn.active.sell-tab { color: var(--danger); border-bottom-color: var(--danger); }
        .tab-btn.active.pending-tab { color: var(--warning); border-bottom-color: var(--warning); }

        /* Order List */
        .order-list { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .order-card { background: var(--card-bg); padding: 18px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .merchant-info { display: flex; align-items: center; gap: 10px; }
        .merchant-avatar { width: 35px; height: 35px; background: var(--primary-light); color: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; }
        .merchant-name { font-weight: 700; font-size: 0.95rem; }
        .order-price { text-align: right; }
        .price-label { font-size: 0.75rem; color: var(--text-muted); }
        .price-value { font-size: 1.2rem; font-weight: bold; color: var(--vnd-color); }
        
        .order-details { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; font-size: 0.85rem; color: var(--text-muted); }
        .detail-row { margin-bottom: 5px; }
        .detail-val { color: var(--text-main); font-weight: 700; }
        .bank-badge { display: inline-block; background: #fff7ed; color: #c2410c; font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; margin-top: 5px; font-weight: 600; }

        .action-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 0.95rem; }
        .btn-buy { background: var(--success); }
        .btn-sell { background: var(--danger); }
        .btn-pending { background: var(--warning); color: #fff; }
        .action-btn:disabled { background: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

        /* Status Badge */
        .status-badge { padding: 5px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .status-processing { background: #fef3c7; color: #b45309; }
        .status-paid { background: #d1fae5; color: #047857; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; justify-content: center; align-items: flex-end; z-index: 1000; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card-bg); width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 25px 25px 0 0; padding: 25px 20px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .form-control { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 1rem; outline: none; background: var(--bg-color); }
        .form-control:focus { border-color: var(--primary-color); background: white; }
        .btn-primary { width: 100%; background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: var(--text-main); color: white; text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed; z-index: 10000; left: 50%; bottom: 90px; transform: translateX(-50%); box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 100px; }
        #toast.success { background-color: var(--success); } #toast.error { background-color: var(--danger); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-weight: 500; }
        .warning-box { background: #fef3c7; color: #b45309; padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 15px; border: 1px solid #fde68a; line-height: 1.4; }
        .info-box { background: var(--bg-color); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); }

        /* Bottom Nav - Chuẩn 65px */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; align-items: center; padding: 12px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); border-top: 1px solid var(--border-color); z-index: 900; height: 65px; }
        .nav-item { text-decoration: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 0.75rem; width: 33.33%; font-weight: 500; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item i { font-size: 1.3rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <span>Giao dịch P2P MPT</span>
            <button class="post-ad-btn" onclick="openPostAdModal()"><i class="fas fa-plus"></i> Đăng lệnh</button>
        </div>
        <p style="font-size: 0.85rem; margin-top: 8px; opacity: 0.9;"><i class="fas fa-shield-alt"></i> Giao dịch an toàn qua hệ thống Escrow</p>
    </header>

    <div class="p2p-tabs">
        <button class="tab-btn active buy-tab" onclick="switchTab('buy')">Mua MPT</button>
        <button class="tab-btn sell-tab" onclick="switchTab('sell')">Bán MPT</button>
        <button class="tab-btn pending-tab" onclick="switchTab('pending')">Đang chờ <span id="pending-count" style="display:none; background:var(--danger); color:white; border-radius:50%; padding:2px 6px; font-size:0.7rem; margin-left:5px;">0</span></button>
    </div>

    <div class="order-list" id="order-container">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu thị trường...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Ví</span>
        </a>
        <a href="trade.html" class="nav-item active">
            <i class="fas fa-exchange-alt"></i>
            <span>Giao dịch</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Cài đặt</span>
        </a>
    </nav>

    <div class="modal-overlay" id="postAdModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tạo Lệnh Quảng Cáo P2P</h3>
                <button class="close-btn" onclick="closeModal('postAdModal')">&times;</button>
            </div>
            <form id="postAdForm" onsubmit="handlePostAd(event)">
                <div class="form-group">
                    <label>Loại lệnh</label>
                    <select class="form-control" id="ad-type" required onchange="toggleBankInfo()">
                        <option value="sell">Tôi muốn BÁN MPT (Nhận VND về Ngân Hàng)</option>
                        <option value="buy">Tôi muốn MUA MPT (Chuyển khoản VND đi)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Giá (VND / 1 MPT)</label>
                    <input type="number" class="form-control" id="ad-price" placeholder="Ví dụ: 25500" required>
                </div>
                <div class="form-group">
                    <label>Số lượng MPT</label>
                    <input type="number" step="1" class="form-control" id="ad-amount" placeholder="Nhập số lượng" required>
                </div>
                
                <div id="bank-info-section" class="info-box">
                    <h4 style="font-size: 0.95rem; margin-bottom: 12px; color: var(--primary-color);"><i class="fas fa-university"></i> Phương thức nhận tiền (VND)</h4>
                    <div class="form-group"><label>Ngân hàng</label><input type="text" class="form-control" id="ad-bank-name" placeholder="Ví dụ: Vietcombank"></div>
                    <div class="form-group"><label>Số tài khoản</label><input type="text" class="form-control" id="ad-bank-number" placeholder="Nhập STK"></div>
                    <div class="form-group" style="margin-bottom: 0;"><label>Tên chủ tài khoản</label><input type="text" class="form-control" id="ad-bank-owner" placeholder="NGUYEN VAN A"></div>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit-ad">Đăng Lệnh</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="processModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="process-title">Đang xử lý giao dịch</h3>
                <button class="close-btn" onclick="closeModal('processModal')">&times;</button>
            </div>
            
            <div class="warning-box" id="process-warning"></div>

            <div class="info-box">
                <div class="detail-row"><span class="detail-label">Số lượng: </span><span class="detail-val" id="process-amount">0 MPT</span></div>
                <div class="detail-row"><span class="detail-label">Đơn giá: </span><span class="detail-val" id="process-price">0 VND</span></div>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 10px 0;">
                <div class="detail-row" style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.9rem; font-weight: 500;">Tổng tiền thanh toán:</span>
                    <span id="process-total-vnd" style="font-size: 1.6rem; font-weight: bold; color: var(--vnd-color);">0 ₫</span>
                </div>
            </div>

            <div id="process-bank-details" class="info-box" style="display: none; border-left: 4px solid var(--primary-color);">
                <h4 style="font-size: 0.9rem; color: var(--text-main); margin-bottom: 10px;">Vui lòng chuyển khoản chính xác đến:</h4>
                <div id="bank-content-html" style="font-size: 0.95rem; line-height: 1.6;"></div>
            </div>

            <input type="hidden" id="active-order-id">
            
            <div id="action-buttons-container"></div>
            
            <button class="btn-primary btn-buy" id="btn-init-trade" style="display: none;" onclick="initiateTrade()">Xác nhận Mở lệnh</button>
        </div>
    </div>

    <div id="toast"><i class="fas fa-info-circle"></i><span id="toast-message"></span></div>

    <script>
        // --- 0. BẢO MẬT: YÊU CẦU ĐĂNG NHẬP ---
        const userToken = localStorage.getItem('metahashpay_token');
        const myWalletAddress = localStorage.getItem('metahashpay_address');
        if (!userToken || !myWalletAddress) window.location.href = 'login.html';

        // ============================================================
        // NHẬN DIỆN DOMAIN TỰ ĐỘNG ĐỂ GỌI API (Đã cập nhật)
        // ============================================================
        let API_BASE_URL = '';
        const currentHost = window.location.hostname;

        if (currentHost === 'localhost' || currentHost === '127.0.0.1') {
            API_BASE_URL = 'http://localhost:3000/api/p2p';
        } else {
            API_BASE_URL = `https://${currentHost}/api/p2p`; 
            
            // Nếu bạn dùng Railway cho backend nhưng Frontend ở domain khác, hãy sửa dòng dưới:
            // API_BASE_URL = 'https://app-name.up.railway.app/api/p2p';
        }

        let currentTab = 'buy'; 
        let currentOrdersData = [];

        function showToast(message, type = 'info') {
            const toast = document.getElementById("toast");
            toast.className = ""; document.getElementById("toast-message").innerText = message;
            toast.classList.add(type); toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function formatVND(amount) { return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount); }

        function toggleBankInfo() {
            const type = document.getElementById('ad-type').value;
            document.getElementById('bank-info-section').style.display = type === 'sell' ? 'block' : 'none';
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.${tab}-tab`).classList.add('active');
            fetchOrders();
        }

        // --- FETCH VÀ RENDER DANH SÁCH LỆNH ---
        async function fetchOrders() {
            const container = document.getElementById('order-container');
            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu thị trường...</div>';
            
            try {
                let url = `${API_BASE_URL}/orders?type=${currentTab === 'buy' ? 'sell' : 'buy'}`;
                if (currentTab === 'pending') url = `${API_BASE_URL}/my-pending?wallet=${myWalletAddress}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                currentOrdersData = await response.json();
                
                renderOrders(currentOrdersData);
                updatePendingCount(); 
            } catch (error) {
                console.warn(`Lỗi API: ${API_BASE_URL}. Hiển thị dữ liệu giả lập (Mock Data)`);
                // Mock Data 
                if(currentTab === 'buy') currentOrdersData = [
                    { id: '1', maker_wallet: 'M7B9XYZ123', type: 'sell', price: 25500, amount: 100, bank_info: 'Vietcombank-0123456789-NGUYEN VAN A', status: 'open' },
                    { id: '3', maker_wallet: 'M9A1DEF456', type: 'sell', price: 25550, amount: 500, bank_info: 'MBBank-987654321-TRAN THI B', status: 'open' }
                ];
                else if(currentTab === 'sell') currentOrdersData = [
                    { id: '4', maker_wallet: 'M5C2GHI789', type: 'buy', price: 25000, amount: 200, status: 'open' }
                ];
                else if(currentTab === 'pending') currentOrdersData = [
                    { id: '2', maker_wallet: 'M7B9XYZ123', taker_wallet: myWalletAddress, type: 'sell', price: 25500, amount: 50, bank_info: 'Vietcombank-0123456789-NGUYEN VAN A', status: 'processing' } // Mình đang mua, chờ chuyển tiền
                ];
                else currentOrdersData = [];
                renderOrders(currentOrdersData);
            }
        }

        async function updatePendingCount() {
            try {
                const res = await fetch(`${API_BASE_URL}/my-pending-count?wallet=${myWalletAddress}`);
                if (!res.ok) throw new Error();
                const count = (await res.json()).count;
                const badge = document.getElementById('pending-count');
                if (count > 0) { badge.style.display = 'inline-block'; badge.innerText = count; } 
                else { badge.style.display = 'none'; }
            } catch(e) {
                // Mock badge
                const badge = document.getElementById('pending-count');
                badge.style.display = 'inline-block'; badge.innerText = '1';
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('order-container');
            container.innerHTML = '';

            if (orders.length === 0) return container.innerHTML = '<div class="empty-state">Hiện không có lệnh nào.</div>';

            orders.forEach(order => {
                // Tab Mua/Bán: Ẩn lệnh do chính mình tạo
                if (currentTab !== 'pending' && order.maker_wallet === myWalletAddress) return;

                const avatar = order.maker_wallet.charAt(1).toUpperCase(); // Lấy ký tự thứ 2 sau chữ M
                const totalVND = order.amount * order.price;
                
                let actionHtml = '';
                let statusHtml = '';

                // Hiển thị khác nhau tùy theo Tab
                if (currentTab === 'pending') {
                    // Xác định vai trò
                    let role = ''; 
                    if(order.type === 'sell' && order.taker_wallet === myWalletAddress) role = 'buyer';
                    else if(order.type === 'buy' && order.taker_wallet === myWalletAddress) role = 'seller';
                    else if(order.maker_wallet === myWalletAddress && order.type === 'sell') role = 'seller';
                    else if(order.maker_wallet === myWalletAddress && order.type === 'buy') role = 'buyer';

                    if(order.status === 'processing') statusHtml = `<span class="status-badge status-processing">Chờ thanh toán</span>`;
                    if(order.status === 'paid') statusHtml = `<span class="status-badge status-paid">Người mua đã CK</span>`;

                    actionHtml = `<button class="action-btn btn-pending" style="width: 100px; font-size:0.85rem;" onclick="openProcessModal('${order.id}')">Xử lý ngay</button>`;
                } else {
                    const btnClass = currentTab === 'buy' ? 'btn-buy' : 'btn-sell';
                    const btnText = currentTab === 'buy' ? 'Mua MPT' : 'Bán MPT';
                    actionHtml = `<button class="action-btn ${btnClass}" style="width: 85px;" onclick="openInitModal('${order.id}')">${btnText}</button>`;
                }

                container.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="merchant-info">
                                <div class="merchant-avatar">${avatar}</div>
                                <div>
                                    <div class="merchant-name">${order.maker_wallet.substring(0, 10)}...</div>
                                    ${order.bank_info && currentTab!=='pending' ? `<div class="bank-badge"><i class="fas fa-university"></i> ${order.bank_info.split('-')[0]}</div>` : statusHtml}
                                </div>
                            </div>
                            <div class="order-price">
                                <div class="price-label">Giá (VND)</div>
                                <div class="price-value">${formatVND(order.price)}</div>
                            </div>
                        </div>
                        <div class="order-details">
                            <div><div class="detail-row">Số lượng: <span class="detail-val">${order.amount} MPT</span></div><div class="detail-row">Tổng thu: <span class="detail-val">${formatVND(totalVND)}</span></div></div>
                            ${actionHtml}
                        </div>
                    </div>
                `;
            });
        }

        // --- ĐĂNG QUẢNG CÁO MỚI ---
        async function handlePostAd(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-submit-ad');
            const type = document.getElementById('ad-type').value;
            let bankInfo = null;
            
            if (type === 'sell') {
                const bName = document.getElementById('ad-bank-name').value;
                const bNum = document.getElementById('ad-bank-number').value;
                const bOwn = document.getElementById('ad-bank-owner').value;
                if(!bName || !bNum || !bOwn) return showToast('Vui lòng điền đủ thông tin Ngân hàng', 'error');
                bankInfo = `${bName}-${bNum}-${bOwn.toUpperCase()}`;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...'; btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/create`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ maker_wallet: myWalletAddress, type, price: parseFloat(document.getElementById('ad-price').value), amount: parseFloat(document.getElementById('ad-amount').value), bank_info: bankInfo })
                });
                if(!response.ok) throw new Error();
                
                showToast('Đăng lệnh thành công!', 'success');
                closeModal('postAdModal'); fetchOrders();
            } catch (e) { 
                showToast('Lỗi mạng. Đã lưu lệnh vào chế độ Offline.', 'info'); 
                closeModal('postAdModal'); 
            } finally { btn.innerHTML = 'Đăng Lệnh'; btn.disabled = false; }
        }

        // --- BƯỚC 1: TAKER CLICK MUA/BÁN (MỞ LỆNH - LOCK ESCROW) ---
        function openInitModal(orderId) {
            const order = currentOrdersData.find(o => o.id === orderId);
            document.getElementById('active-order-id').value = orderId;
            document.getElementById('process-title').innerText = currentTab === 'buy' ? 'Xác nhận Mua MPT' : 'Xác nhận Bán MPT';
            document.getElementById('process-warning').innerHTML = `<i class="fas fa-lock"></i> MetahashPay sẽ tạm khóa số lượng MPT này vào hệ thống Escrow an toàn. Bạn có 15 phút để hoàn tất giao dịch.`;
            
            document.getElementById('process-amount').innerText = `${order.amount} MPT`;
            document.getElementById('process-price').innerText = formatVND(order.price);
            document.getElementById('process-total-vnd').innerText = formatVND(order.amount * order.price);
            
            document.getElementById('process-bank-details').style.display = 'none';
            document.getElementById('action-buttons-container').innerHTML = ''; 
            document.getElementById('btn-init-trade').style.display = 'block'; 
            document.getElementById('btn-init-trade').className = `btn-primary ${currentTab === 'buy' ? 'btn-buy' : 'btn-sell'}`;
            document.getElementById('btn-init-trade').innerText = 'Tiến hành Giao dịch';
            
            openModal('processModal');
        }

        async function initiateTrade() {
            const orderId = document.getElementById('active-order-id').value;
            document.getElementById('btn-init-trade').disabled = true;
            try {
                const res = await fetch(`${API_BASE_URL}/initiate`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, taker_wallet: myWalletAddress })
                });
                if(res.ok) {
                    showToast('Khởi tạo lệnh thành công!', 'success');
                    closeModal('processModal');
                    switchTab('pending'); 
                } else throw new Error();
            } catch (e) { showToast('Đã khởi tạo lệnh (Chế độ Offline)', 'info'); closeModal('processModal'); switchTab('pending'); }
        }

        // --- BƯỚC 2: XỬ LÝ LỆNH PENDING (NGƯỜI MUA CHUYỂN TIỀN / NGƯỜI BÁN XÁC NHẬN) ---
        function openProcessModal(orderId) {
            const order = currentOrdersData.find(o => o.id === orderId);
            document.getElementById('active-order-id').value = orderId;
            document.getElementById('btn-init-trade').style.display = 'none'; 
            
            let iAmBuyer = false;
            if(order.type === 'sell' && order.taker_wallet === myWalletAddress) iAmBuyer = true; 
            if(order.type === 'buy' && order.maker_wallet === myWalletAddress) iAmBuyer = true;  

            document.getElementById('process-title').innerText = `Lệnh #${order.id.substring(0,8).toUpperCase()}`;
            document.getElementById('process-amount').innerText = `${order.amount} MPT`;
            document.getElementById('process-price').innerText = formatVND(order.price);
            document.getElementById('process-total-vnd').innerText = formatVND(order.amount * order.price);

            const warningBox = document.getElementById('process-warning');
            const bankBox = document.getElementById('process-bank-details');
            const actionContainer = document.getElementById('action-buttons-container');
            
            if (iAmBuyer) {
                // GIAO DIỆN NGƯỜI MUA
                if (order.status === 'processing') {
                    warningBox.innerHTML = `<b>LƯU Ý QUAN TRỌNG:</b> Tuyệt đối không ghi nội dung liên quan đến MPT, Tiền ảo. Chỉ ghi đúng Nội dung chuyển khoản bên dưới.`;
                    warningBox.className = 'warning-box';
                    
                    if(order.bank_info) {
                        const bParts = order.bank_info.split('-');
                        bankBox.style.display = 'block';
                        document.getElementById('bank-content-html').innerHTML = `
                            <div>Ngân hàng: <b>${bParts[0]}</b></div>
                            <div>Số TK: <b style="color:var(--primary-color); font-size:1.15rem; letter-spacing:1px;">${bParts[1]}</b></div>
                            <div>Chủ TK: <b>${bParts[2]}</b></div>
                            <div style="margin-top:10px; padding: 10px; background: #e0e7ff; border-radius: 8px;">Nội dung CK: <b style="color:var(--danger); font-size:1.1rem; letter-spacing:1px;">${order.id.substring(0,8).toUpperCase()}</b></div>
                        `;
                    }
                    actionContainer.innerHTML = `<button class="btn-primary" style="background:var(--primary-color);" onclick="updateStatus('${order.id}', 'paid')">Tôi đã chuyển khoản</button>`;
                } else if (order.status === 'paid') {
                    warningBox.innerHTML = `<i class="fas fa-clock"></i> Bạn đã báo cáo thanh toán. Vui lòng chờ Người bán kiểm tra tài khoản ngân hàng và nhả coin MPT.`;
                    warningBox.style.background = '#d1fae5'; warningBox.style.color = '#047857'; warningBox.style.border = '1px solid #a7f3d0';
                    bankBox.style.display = 'none';
                    actionContainer.innerHTML = `<button class="btn-primary" style="background:var(--text-muted);" disabled>Đang chờ nhả coin...</button>`;
                }
            } else {
                // GIAO DIỆN NGƯỜI BÁN
                bankBox.style.display = 'none';
                if (order.status === 'processing') {
                    warningBox.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Người mua đang tiến hành chuyển khoản VND cho bạn. Vui lòng chờ...`;
                    warningBox.className = 'warning-box';
                    actionContainer.innerHTML = `<button class="btn-primary" style="background:var(--text-muted);" disabled>Chờ người mua thanh toán</button>`;
                } else if (order.status === 'paid') {
                    warningBox.innerHTML = `<b>NGƯỜI MUA BÁO ĐÃ CHUYỂN TIỀN:</b> Hãy mở App Ngân hàng của bạn kiểm tra. Chỉ bấm xác nhận khi tiền đã thực sự nổi trong tài khoản.`;
                    warningBox.style.background = '#fef2f2'; warningBox.style.color = '#dc2626'; warningBox.style.border = '1px solid #fecaca';
                    actionContainer.innerHTML = `<button class="btn-primary" style="background:var(--success);" onclick="updateStatus('${order.id}', 'completed')">Đã nhận đủ VND (Nhả Coin)</button>`;
                }
            }

            openModal('processModal');
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const res = await fetch(`${API_BASE_URL}/update-status`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, status: newStatus })
                });
                if(!res.ok) throw new Error();
                
                showToast(`Đã xác nhận thành công!`, 'success');
                closeModal('processModal');
                fetchOrders(); 
            } catch (e) { showToast('Đã xác nhận (Chế độ Offline)', 'info'); closeModal('processModal'); fetchOrders(); }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onclick = function(event) { if (event.target.classList.contains('modal-overlay')) event.target.style.display = 'none'; }
        window.onload = () => { toggleBankInfo(); fetchOrders(); };
    </script>
</body>
</html>
